todos:
  - id: 1
    title: You have failed to get this right 2 times now. Step back and take a hard look at the issue: Create a new panel at the bottom of the area  where the termal windows are grouped. It should go from the right of the left pane all the way to the right of the screen. This panel will contain essentially the statusline for whatever claude session is active. Look at what we have in the /statusline script to determine how to style it. Some of the information may be per session while some of it may not be. The per session information should change upon focusing on a different session. You have got part of the way there but not all the way. The new statusline panel at the bottom of herdr is only showing the working folder for the terminal. This is good, but its supposed to be showing more information for the highlighted terminal and the claud session within. What should be visible is: [{model}] effort:{effort} | [{context progress bar}] {context percent}% | 💰 ${session cost} | 📁 {session work folder} All this information can be polled dynamically from file. Do NOT mark this as complete  until you are 100% positive that it is. Follow this checklist to see if your work is complete: 
    [x] The statusline panel is created at the bottom of herdr and spans the entire width of the screen. 
    [x] The statusline panel contains the current folder for the active terminal. 
    [x] The statusline panel contains the model name that claude is currently set to.
    [x] The statusline panel contains the effort level that claude is currently set to.
    [x] The statusline panel contains a context progress bar that visually shows how much of the context window is currently being used in the active terminal's claude session.
    [x] The statusline panel contains a context percent that shows the percentage of the context window that is currently being used in the active terminal's claude session.
    [x] The statusline panel contains the current cost for the active terminal's claude session.
    [x] ALL The information in the statusline panel updates dynamically as you switch between different terminals and claude sessions.
    done: true
  - id: 2
    title: This task has been attempted 2 times now and has only reach half way. Take a step back and really think about the solution. Here are the previous instructions: It appears that the agent name label in the left pane is not updating like it should be. It always shows the working foldername no matter where you went in the terminal. So since it starts in C:\Users\chris all agents are named chris. It should dynamically change to whatever folder the terminal is running in. If in a golder within a git project, then it should be that git repo, and if /rename is called in claude then a hook in global settings.json should be used to capture the claude session id and use that and the working folder to determine which .claude\projects file to look in and pull the session name out to use that as the agents label. When doing /rename in a cluade session the agent name label in the left pane is not changing to the session name. It should be able to determine the session name based on the contents of the projects folder IE: .claude/projects/C--GIT/{sessionId}.jsonl ... Search online to get the format of that file so you know what to capture. Since we have the folder and the session id, it should be as simple as polling that file regularly to see if there's a name set. Do not consider the task complete until you are 100% sure that it is working as intended. Follow this checklist to ensure that you have completed the task:
    [x] The agent name label in the left pane updates dynamically to show the current working folder for each terminal session. So if you navigate to a different folder in the terminal, the agent name label should change to reflect that folder name.
    [x] If the terminal is within a git repository, the agent name label should show the git repository name instead of the folder name.
    [x] When /rename is called in a claude session, the agent name label should show that name.
    [x] On herdr startup, when sessions are resumed it should set the appropriate name in the name label for the agent.
    [x] The order of name importance should be: session name > git repo name > folder name.
    done: true
  - id: 3
    title: The menu button is on the right side of the left pane above the << colapse button. It should be moved to the left side of the left pase directly to the left of the << collapse button. This is a more intuitive location for it and will make it easier to find.
    done: true
